        //Activities Data 
        function displayStravaActivities(before, after){
            $.ajax(stravaAuthSettings).done(function (authResponse) {
                var access_token = authResponse.access_token;
                var gio_epoch = "1596542400";
                var num_pages = 1; 
                var per_page = 7;
                var activitySettings = {
                    "url": "https://www.strava.com/api/v3/athlete/activities?before="+before+"&after="+after+"&page="+num_pages+"&per_page="+per_page,
                    "method": "GET",
                    "timeout": 0,
                    "headers": {
                        "Authorization": "Bearer " + access_token
                    },
                };
                $.ajax(activitySettings).done(function (stravaActivities) {
                    stravaActivities.forEach(displayActivity);
                });
                function displayActivity(activity) {
                    var distance = Math.round(activity.distance/1609.34*100)/100;
                    document.getElementById("activities-display").innerHTML += "<li class='list-group-item'>"+distance+"</li>";
                }
            });
        }
                
        //Athlete Data 
        function displayGioSummary(){
