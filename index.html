<html lang="en">
    <head>
        <style>
          body {
            font-family: 'helvetica' !important;
          }
          a {
            color: black !important; 
            text-decoration: none !important;
          }
          a:hover{
            cursor: pointer;
            color: #65674b !important;
          }
        </style>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
        <link href='https://fonts.googleapis.com/css?family=Noto Sans' rel='stylesheet'>
        <title>Gio Lee</title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    </head>
    <body>
      <div class="containter">
        <div class="row gx-0">
            <!--desktop-->
            <div class="col-md-2 offset-md-1 pt-3 d-none d-md-block">
                <h5 class="mb-3"><a href="">Gio Lee</a></h5>
                <h6 class="mb-3"><a href="">Photo</a></h6>
                <h6 class="mb-3"><a class="runningLog-button">Running Log</a></h6>
                <div class="ms-1" id="year-list-desktop" style="display: none">
                    <h6 class="mb-3"><a id="summary-title" href="?summary=overall">Summary</a></h6>
                </div>
                <h6 class="mb-3"><a id="profile-title" href="?profile=show">Profile</a></h6>
                <h6><a href="">Contact</a></h6>
            </div>
            <!--mobile-->
            <div class="col-12 px-3 pt-3 d-md-none d-sm-block">
                <h5>
                    <a href="">Gio Lee</a>
                    <a id="menu-button" class="float-end">Menu</a>
                </h5> 
                <div style="display: none" id="mobile-menu">
                    <h6 class="mb-3 mt-3"><a href="">Photo</a></h6>
                    <h6 class="mb-3"><a class="runningLog-button">Running Log</a></h6>
                    <div class="ms-1" id="year-list-mobile" style="display: none">
                        <h6 class="mb-3"><a href="?summary=overall">Summary</a></h6>
                    </div>
                    <h6 class="mb-3"><a id="profile-title" href="?profile=show">Profile</a></h6>
                    <h6><a href="">Contact</a></h6>
                </div>
            </div>
            <!--center content-->
            <div class="col-md-6">
                <h5 class="mx-3 my-3" id="month-title"></h5> 
                <div class="mx-3 mb-3" id="activities-display"></div>
            </div>
        </div>  
      </div>
        <!-- Optional JavaScript; choose one of the two! -->

        <!-- Option 1: Bootstrap Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js" integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0" crossorigin="anonymous"></script>

        <!-- Option 2: Separate Popper and Bootstrap JS -->
        <!--
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.6.0/dist/umd/popper.min.js" integrity="sha384-KsvD1yqQ1/1+IA7gi3P0tyJcT3vR+NdBTt13hSJ2lnve8agRGXTTyNaBYmCR/Nwi" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.min.js" integrity="sha384-nsg8ua9HAw1y0W1btsyWgBklPnCUAFLuTMS2G72MMONqmOymq585AcH49TLBQObG" crossorigin="anonymous"></script>
        -->
    </body>
    <script>
        var currentDate = new Date();
        var currentMonth = currentDate.getMonth();
        var currentYear = currentDate.getFullYear();
        var monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        for(j = currentYear; j >= 2020; j--){
            document.getElementById("year-list-desktop").innerHTML += "<h6 class='mb-3'><a name='year-button-desktop' id='"+j+"'>"+j+"</a></h6><div style='display: none;' class='ms-1' id='"+j+"-desktop'></div>";
            document.getElementById("year-list-mobile").innerHTML += "<h6 class='mb-3'><a name='year-button-mobile' id='"+j+"'>"+j+"</a></h6><div style='display: none;' class='ms-1' id='"+j+"-mobile'></div>";
            if(j == currentYear){
                for(i = 0; i <= currentMonth; i ++){
                    document.getElementById(j+"-desktop").innerHTML += "<h6 class='mb-3'><a id='"+i+j+"' href='?year="+j+"&month="+i+"'>"+monthNames[i]+"</a></h6>";
                    document.getElementById(j+"-mobile").innerHTML += "<h6 class='mb-3'><a href='?year="+j+"&month="+i+"'>"+monthNames[i]+"</a></h6>";
                }
            }
            if(j == 2020){
                for(i = 9; i < 12; i ++){
                    document.getElementById(j+"-desktop").innerHTML += "<h6 class='mb-3'><a id='"+i+j+"' href='?year="+j+"&month="+i+"'>"+monthNames[i]+"</a></h6>";
                    document.getElementById(j+"-mobile").innerHTML += "<h6 class='mb-3'><a href='?year="+j+"&month="+i+"'>"+monthNames[i]+"</a></h6>";
                }
            }
            if(j != 2020 && j != currentYear){
                for(i = 0; i < 12; i ++){
                    document.getElementById(j+"-desktop").innerHTML += "<h6 class='mb-3'><a id='"+i+j+"' href='?year="+j+"&month="+i+"'>"+monthNames[i]+"</a></h6>";
                    document.getElementById(j+"-mobile").innerHTML += "<h6 class='mb-3'><a href='?year="+j+"&month="+i+"'>"+monthNames[i]+"</a></h6>";
                }
            }
        }
        var queryURL = window.location.search;
        var urlParams = new URLSearchParams(queryURL);
        var yearURL = urlParams.get('year');
        var monthURL = urlParams.get('month');
        var summaryURL = urlParams.get('summary');
        var profileURL = urlParams.get('profile');

        var month = parseInt(monthURL) + 1;
        var year = parseInt(yearURL);

        if(yearURL != null && monthURL != null && summaryURL == null){
            document.getElementById("month-title").innerHTML = monthNames[monthURL] + " " + yearURL;
            $("#year-list-desktop").toggle();
            $("#"+yearURL+"-desktop").toggle();
            $("#"+monthURL+yearURL).css({"font-size": "110%","font-weight": "bold"});
            var max_distance = 0;
            var max_average_speed = 0;
            var max_elevation_gain = 0;
      
            $.getJSON("https://jeeohly.github.io/stravaActivities/"+year+"/"+month+".json", function(activitiesJson) {
                var activitiesJsonLength = activitiesJson.length; 
                var activitiesJsonIndex = 0;
                activitiesJson.forEach(function(activity){
                    var start_date = activity.start_date;
                    var date = start_date.split("T")[0];
                    var day = date.split("-")[2];
                    var distance = (Math.round((activity.distance/1609.34)*100)/100).toFixed(2);
                    var average_pace = 0;
                    var average_speed = activity.average_speed;
                    if(distance <= 0){
                        average_pace = 0;
                    }else{
                        average_pace = (activity.moving_time/60)/(activity.distance/1609.34);
                    }
                    var average_pace_min = Math.floor(average_pace);
                    var average_pace_sec = Math.floor((average_pace - average_pace_min)*60).toLocaleString('en-US', {
                        minimumIntegerDigits: 2,
                        useGrouping: false
                    });;
                    var elevation_gain = Math.round(activity.total_elevation_gain*3.28084);
                    if(parseFloat(distance) > max_distance){
                        max_distance = distance; 
                    }
                    if(average_speed > max_average_speed){
                        max_average_speed = average_speed;
                    }
                    if(elevation_gain > max_elevation_gain){
                        max_elevation_gain = elevation_gain;
                    }
                    document.getElementById("activities-display").innerHTML += "<div class='row'><div class='col'>"+monthNames[monthURL]+" "+day+"</div></div><div class='row'><div class='col-3 text-success'><div class='fw'><small>Distance</small></div><strong>"+distance+"<small> mi</small></strong></div><div class='col-9 my-auto'><div class='progress' id='d-"+activitiesJsonIndex+"'>"+distance+"</div></div></div><div class='row'><div class='col text-primary'><div class='fw'><small>Avg Pace</small></div><strong>"+average_pace_min+":"+average_pace_sec+"<small> /mi</small></strong></div><div class='col-9 my-auto'><div class='progress' id='m-"+activitiesJsonIndex+"'>"+average_speed+"</div></div></div><div class='row mb-3'><div class='col text-danger'><div class='fw'><small>Elev. Gain</small></div><strong>"+elevation_gain+"<small> ft</small></strong></div><div class='col-9 my-auto'><div class='progress' id='e-"+activitiesJsonIndex+"'>"+elevation_gain+"</div></div></div>";
                    activitiesJsonIndex += 1;
                });
                document.getElementById("activities-display").innerHTML += "<h5 class='mb-3' id='top-button'><a onclick='topFunction()'>Back to top</a></h5>";
                for(i = 0; i < activitiesJsonLength; i++){
                    var distanceNum = document.getElementById("d-"+i).innerHTML;
                    var distancePercent = Math.round(distanceNum/max_distance*100);
                    document.getElementById("d-"+i).innerHTML = "<div class='progress-bar bg-success' role='progressbar' style='width: "+distancePercent+"%'' aria-valuenow='"+distancePercent+"' aria-valuemin='0' aria-valuemax='100'></div>";
                    var average_speedNum = document.getElementById("m-"+i).innerHTML;
                    var average_speedPercent = Math.round(average_speedNum/max_average_speed*100);
                    document.getElementById("m-"+i).innerHTML = "<div class='progress-bar bg-primary' role='progressbar' style='width: "+average_speedPercent+"%'' aria-valuenow='"+average_speedPercent+"' aria-valuemin='0' aria-valuemax='100'></div>";
                    var elevation_gainNum = document.getElementById("e-"+i).innerHTML;
                    var elevation_gainPercent = Math.round(elevation_gainNum/max_elevation_gain*100);
                    document.getElementById("e-"+i).innerHTML = "<div class='progress-bar bg-danger' role='progressbar' style='width: "+elevation_gainPercent+"%'' aria-valuenow='"+elevation_gainPercent+"' aria-valuemin='0' aria-valuemax='100'></div>";
                }
            });
        }

        $(document).ajaxError(function(event, msg, settings){
            if(msg.status == 404){
                document.getElementById("activities-display").innerHTML = "No activities";
            }
        });

        if(profileURL == "show"){
            document.getElementById("activities-display").innerHTML = "<div class='mb-3'>Software Developer</div><div class='mb-3'>Education<br>University of Virginia School of Engineering and Applied Science 2020<br>Bachelor of Science in Computer Science</div>";
        }

        $(document).ready(function(){
            jQuery('#menu-button').click(function(){
                $( "#mobile-menu" ).toggle();
                if($('#menu-button').text() == "Menu"){
                    $('#menu-button').text("Close");
                }else{
                    $('#menu-button').text("Menu");
                }
            });
            jQuery('.runningLog-button').click(function(){
                $("#year-list-desktop").toggle();
                $("#year-list-mobile").toggle();
            });
            jQuery("[name='year-button-desktop']").click(function(){
                $( "#"+this.id+"-desktop").toggle();
            });
            jQuery("[name='year-button-mobile']").click(function(){
                $( "#"+this.id+"-mobile").toggle();
            });
            if(summaryURL != null){
                $("#year-list-desktop").toggle();
                $("#summary-title").css({"font-size": "110%","font-weight": "bold"});
            }
            if(profileURL != null){
                $("#profile-title").css({"font-size": "110%","font-weight": "bold"});
            }
        });

        function topFunction() {
            document.body.scrollTop = 0; 
            document.documentElement.scrollTop = 0; 
        }
    </script>
</html>
